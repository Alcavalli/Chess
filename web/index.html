<!DOCTYPE html>
<html>
    <head>
        <meta charset = "UTF-8">
        <title>Chess</title>
        <link rel = "stylesheet"  href = "style.css">
    </head>

    <body>
        <div id = "board-container">
            <center>
                <div id = "board"></div>
            </center>
        </div>

        <div id = "game-over"  class = "hidden">
            <button id = "close-overlay">✕</button>
            <p id = "result-message"></p>
            <button id = "play-again">Play Again</button>
            <button id = "quit">Leave</button>
        </div>

        <div id = "promotion-picker"  class = "hidden">
            <div id = 'N'><h1>N</h1></div>
            <div id = 'B'><h1>B</h1></div>
            <div id = 'R'><h1>R</h1></div>
            <div id = 'Q'><h1>Q</h1></div>
        </div>

        <script src = "chess.js"></script>
        <script src = "game.js"></script>
    </body>
</html>
